name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Kotlin / JVM 21
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Test
        run: ./gradlew test --no-daemon

  fixture-sync:
    name: Conformance fixtures in sync with lazily-spec
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout canonical lazily-spec
        uses: actions/checkout@v4
        with:
          repository: lazily-hub/lazily-spec
          path: lazily-spec

      # The test job replays fixtures bundled under src/test/resources/conformance
      # because it has no lazily-spec sibling. Without this check a fixture the
      # spec has changed keeps replaying its stale local copy and stays green.
      - name: Check bundled fixtures against lazily-spec
        run: ./scripts/check-fixture-sync.sh lazily-spec

  lean:
    name: Lean formal models (#lzleanformal)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout canonical lazily-spec
        uses: actions/checkout@v4
        with:
          repository: lazily-hub/lazily-spec
          path: lazily-spec

      - name: Checkout canonical lazily-formal
        uses: actions/checkout@v4
        with:
          repository: lazily-hub/lazily-formal
          path: lazily-formal

      - name: Build lazily-spec IPC formal model
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: lazily-spec/formal/lean
          auto-config: false
          build: true
          test: false
          lint: false

      - name: Build lazily-formal reactive + state-chart model
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: lazily-formal
          auto-config: false
          build: true
          test: false
          lint: false
